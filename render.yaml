services:
  - type: web
    name: mdchart-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: MDCHART_ALLOWED_ORIGINS
        value: "*"
